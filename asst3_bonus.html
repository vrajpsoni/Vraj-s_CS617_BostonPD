<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Crime Data Story (Bonus)</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 1100px;
        }
        .chart {
            width: 100%;
            height: 500px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

<h1>Interactive Nighttime Crime Analysis</h1>

<p>
This version links both charts together. When you click on a bar in the hourly chart,
the map updates to show only crimes from that specific hour.
</p>

<h2>Crimes by Hour (Click to Filter)</h2>
<div id="chart1" class="chart"></div>

<h2>Filtered Crime Map</h2>
<div id="chart2" class="chart"></div>

<script>
function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(',');

    return lines.slice(1).map(line => {
        const values = [];
        let current = '';
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            const nextChar = line[i + 1];

            if (char === '"') {
                if (inQuotes && nextChar === '"') {
                    current += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (char === ',' && !inQuotes) {
                values.push(current);
                current = '';
            } else {
                current += char;
            }
        }

        values.push(current);

        const row = {};
        headers.forEach((header, index) => {
            row[header] = values[index] !== undefined ? values[index] : '';
        });
        return row;
    });
}

let mapDataGlobal = [];

async function loadCharts() {
    const hourText = await (await fetch('night_crimes_by_hour.csv')).text();
    const hourData = parseCSV(hourText);

    const hours = hourData.map(d => Number(d.HOUR));
    const counts = hourData.map(d => Number(d.crime_count));

    Plotly.newPlot('chart1', [{
        x: hours,
        y: counts,
        type: 'bar'
    }], {
        title: 'Nighttime Crimes by Hour'
    });

    const mapText = await (await fetch('night_crime_locations.csv')).text();
    mapDataGlobal = parseCSV(mapText);

    drawMap(mapDataGlobal);

    document.getElementById('chart1').on('plotly_click', function(data) {
        const selectedHour = data.points[0].x;
        const filtered = mapDataGlobal.filter(row => Number(row.HOUR) === selectedHour);
        drawMap(filtered);
    });
}

function drawMap(data) {
    const lat = data.map(d => Number(d.Lat));
    const lon = data.map(d => Number(d.Long));

    Plotly.newPlot('chart2', [{
        type: 'scattermapbox',
        lat: lat,
        lon: lon,
        mode: 'markers',
        marker: { size: 6, opacity: 0.6 }
    }], {
        title: 'Filtered Crime Locations',
        mapbox: {
            style: 'carto-positron',
            center: { lat: 42.32, lon: -71.08 },
            zoom: 10
        }
    });
}

loadCharts();
</script>

</body>
</html>
